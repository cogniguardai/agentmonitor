<?xml version="1.0" encoding="UTF-8"?>
<!-- AgentMonitor OG image placeholder. 1200x630 — the size Facebook,
     Twitter (twitter:card=summary_large_image), LinkedIn and Slack all
     consume. Export this to og.png before launch; most social scrapers
     don't reliably render SVG. -->
<svg xmlns="http://www.w3.org/2000/svg"
     viewBox="0 0 1200 630"
     width="1200" height="630"
     font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Inter, system-ui, sans-serif">
  <!-- background -->
  <rect width="1200" height="630" fill="#000"/>

  <!-- subtle amber glow in bottom-right -->
  <defs>
    <radialGradient id="glow" cx="100%" cy="100%" r="80%">
      <stop offset="0%"  stop-color="#ff9a3c" stop-opacity="0.22"/>
      <stop offset="60%" stop-color="#ff9a3c" stop-opacity="0.04"/>
      <stop offset="100%" stop-color="#000"   stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="grid" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%"  stop-color="#1f1f25" stop-opacity="0.0"/>
      <stop offset="100%" stop-color="#1f1f25" stop-opacity="0.5"/>
    </linearGradient>
  </defs>
  <rect width="1200" height="630" fill="url(#glow)"/>

  <!-- thin grid overlay for that "instrument panel" feel -->
  <g stroke="#1f1f25" stroke-width="1" opacity="0.5">
    <line x1="0"   y1="105" x2="1200" y2="105"/>
    <line x1="0"   y1="210" x2="1200" y2="210"/>
    <line x1="0"   y1="315" x2="1200" y2="315"/>
    <line x1="0"   y1="420" x2="1200" y2="420"/>
    <line x1="0"   y1="525" x2="1200" y2="525"/>
  </g>

  <!-- brand mark: black square with amber eye -->
  <g transform="translate(80, 80)">
    <rect width="56" height="56" rx="12" fill="#000" stroke="#ff9a3c66" stroke-width="1.5"/>
    <circle cx="28" cy="28" r="14" fill="none" stroke="#ff9a3c" stroke-width="3"/>
    <circle cx="28" cy="28" r="5"  fill="#ff9a3c"/>
  </g>
  <!-- Tiny "BY COGNIGUARD AI" parent-brand tag above the product wordmark. -->
  <text x="160" y="100" fill="#5b5b63" font-size="11"
        font-family="JetBrains Mono, SF Mono, Consolas, monospace"
        letter-spacing="3">BY COGNIGUARD AI</text>
  <text x="160" y="128" fill="#e9e9ea" font-size="32" font-weight="600">AgentMonitor</text>
  <text x="160" y="156" fill="#8a8a92" font-size="16"
        font-family="JetBrains Mono, SF Mono, Consolas, monospace"
        letter-spacing="2">FLIGHT RECORDER FOR AI AGENTS</text>

  <!-- headline -->
  <text x="80" y="320" fill="#e9e9ea" font-size="72" font-weight="600" letter-spacing="-1">
    See what your AI agent
  </text>
  <text x="80" y="408" font-size="72" font-weight="600" letter-spacing="-1">
    <tspan fill="#e9e9ea">actually </tspan><tspan fill="#ff9a3c">did.</tspan>
  </text>

  <!-- subline -->
  <text x="80" y="470" fill="#8a8a92" font-size="22">
    Records every prompt, tool call, file touched and dollar spent —
  </text>
  <text x="80" y="500" fill="#8a8a92" font-size="22">
    so when something goes weird, you can rewind.
  </text>

  <!-- footer strip with chips -->
  <g transform="translate(80, 555)" font-family="JetBrains Mono, SF Mono, Consolas, monospace"
     font-size="14">
    <rect x="0"   y="0" width="120" height="32" rx="5" fill="#0a0a0a" stroke="#1f1f25"/>
    <text x="60"  y="21" text-anchor="middle" fill="#8a8a92">local-first</text>

    <rect x="132" y="0" width="100" height="32" rx="5" fill="#0a0a0a" stroke="#1f1f25"/>
    <text x="182" y="21" text-anchor="middle" fill="#8a8a92">no signup</text>

    <rect x="244" y="0" width="80"  height="32" rx="5" fill="#0a0a0a" stroke="#1f1f25"/>
    <text x="284" y="21" text-anchor="middle" fill="#8a8a92">free</text>

    <rect x="336" y="0" width="170" height="32" rx="5" fill="#ff9a3c22" stroke="#ff9a3c66"/>
    <text x="421" y="21" text-anchor="middle" fill="#ff9a3c">cogniguardai.com</text>
  </g>
</svg>
